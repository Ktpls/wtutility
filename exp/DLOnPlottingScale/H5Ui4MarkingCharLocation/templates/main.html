<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>tagsviewer</title>
</head>

<body>
    <canvas id="myCanvas" width="300" height="20" style="border:1px solid #d3d3d3;background:#ffffff;">
        Your browser does not support the HTML5 canvas tag.
    </canvas>
    <script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
    <button id="btnNext">Next</button>
    <script>
        canvasClick = function (e) {
            var c = document.getElementById("myCanvas");
            const canvasInfo = c.getBoundingClientRect()
            console.log(e.clientX - canvasInfo.left, e.clientY - canvasInfo.top)
            $.ajax({
                url: "SetCharStart",
                type: "POST",
                data: { "pos": e.clientX - canvasInfo.left }
            });
            btnNextClick();
        };
        //('#myCanvas')[0].onclick=canvasClick;
        $('#myCanvas').click(canvasClick);

        btnNextClick = function () {
            $.ajax({
                url: "NextPic",
                type: "GET",
                success:function(result){
                    if (result['out']<0){
                        alert('On the end!');
                    }
                    else{
                        var c = document.getElementById("myCanvas");
                        var ctx = c.getContext("2d");
                        var img = new Image();
                        img.src = 'data:image/png;base64,' + result['pic'];
                        img.onload = function () {
                            // 图像加载完成 ，绘制画布中
                            ctx.drawImage(img, 0, 0);
                        }
                    }
                }
            });
        };
        //document.getElementById('btnNext').onclick=btnNextClick;
        $('#btnNext').click(btnNextClick);
        a=$('#btnNext');

        $(document).ready(function () {
            $.ajax({
                url: "InitFileList",
                type: "GET",
            });
        });
    </script>
</body>

</html>
